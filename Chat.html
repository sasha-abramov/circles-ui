<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FamSync — Chat</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: "Google Sans", sans-serif; background: #fff; color: #1B1E28; }
  button { font-family: "Google Sans", sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #E2E6EF; border-radius: 4px; }
  input::placeholder { color: #9CA3AF; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/data.js?v=39"></script>
<script type="text/babel" src="js/components.js?v=63"></script>
<script type="text/babel" src="js/navigation.js?v=48"></script>
<script type="text/babel" src="js/page-shell.js?v=43"></script>
<script type="text/babel" src="js/screen-chat.js?v=56"></script>
<script type="text/babel">
function Page() {
  return <PageShell>{(isMobile, setHideTabBar) => <ChatScreen isMobile={isMobile} setHideTabBar={setHideTabBar} />}</PageShell>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
