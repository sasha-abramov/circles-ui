/* ── SWATCH ──────────────────────────────────────────────────── */
function Swatch({ name, value, text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard?.writeText(value);
    setCopied(true);
    setTimeout(() => setCopied(false), 1200);
  };
  return (
    <div onClick={copy} style={{ cursor: "pointer", width: 100 }}>
      <div style={{
        height: 56, borderRadius: 10, background: value,
        border: value === "#fff" || value === "#F5F7FA" || value === "#F0F2F7" ? "1px solid #E2E6EF" : "none",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 700, color: text, marginBottom: 6,
        transition: "transform 0.1s",
        transform: copied ? "scale(0.95)" : "scale(1)",
      }}>
        {copied ? "Copied!" : ""}
      </div>
      <div style={{ fontSize: 11, fontWeight: 600, color: "#1B1E28", lineHeight: "14px" }}>{name}</div>
      <div style={{ fontSize: 10, color: "#9CA3AF", marginTop: 2, fontFamily: "monospace" }}>{value}</div>
    </div>
  );
}

function GradientSwatch({ name, from, to }) {
  return (
    <div style={{ width: 80 }}>
      <div style={{
        height: 56, borderRadius: 10,
        background: `linear-gradient(135deg, ${from}, ${to})`,

      }} />
      <div style={{ fontSize: 11, fontWeight: 600, color: "#1B1E28" }}>{name}</div>
      <div style={{ fontSize: 10, color: "#9CA3AF", fontFamily: "monospace", marginTop: 1 }}>{from}</div>
      <div style={{ fontSize: 10, color: "#9CA3AF", fontFamily: "monospace" }}>{to}</div>
    </div>
  );
}

/* ── ICON ────────────────────────────────────────────────────── */
function Icon({ src, size = 24, color = "#9CA3AF" }) {
  const filters = {
    "#0F6EFF": "invert(33%) sepia(99%) saturate(2000%) hue-rotate(207deg) brightness(100%) contrast(104%)",
    "#1B1E28": "invert(9%) sepia(14%) saturate(700%) hue-rotate(192deg) brightness(35%) contrast(95%)",
    "#6B7280": "invert(47%) sepia(7%) saturate(600%) hue-rotate(180deg) brightness(90%)",
    "#fff":    "invert(100%)",
  };
  const filter = filters[color] || "invert(70%) sepia(6%) saturate(400%) hue-rotate(180deg) brightness(95%)";
  return <img src={src} width={size} height={size} style={{ filter, display: "block" }} alt="" />;
}

/* ── CIRCLE AVATAR ────────────────────────────────────────────── */
let _caIdx = 0;
function CircleAvatar({ gradient, size = 56 }) {
  const id = React.useRef(`ca-${_caIdx++}`).current;
  const iconSize = Math.round(size * 0.52);
  const colors = (gradient.match(/#[0-9a-fA-F]{3,6}/g) || ["#0F6EFF", "#00C7BE"]);
  const from = colors[0] || "#0F6EFF";
  const to   = colors[1] || from;
  const bgGradient = `linear-gradient(135deg, ${from}4D, ${to}4D)`;
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bgGradient, flexShrink: 0,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <svg width={iconSize} height={iconSize} viewBox="0 0 24 24" fill="none">
        <defs>
          <linearGradient id={id} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={from} />
            <stop offset="100%" stopColor={to} />
          </linearGradient>
        </defs>
        <path
          fillRule="evenodd" clipRule="evenodd"
          d="M17.6584 11.123H17.6334C17.2192 11.1071 16.8941 10.7412 16.9081 10.3034C16.9402 9.29771 16.475 8.64519 15.6638 8.55742C15.2517 8.513 14.9516 8.12382 14.9936 7.6881C15.0366 7.25345 15.4067 6.93301 15.8168 6.97954C17.4253 7.15298 18.4666 8.50983 18.4076 10.3563C18.3936 10.7856 18.0605 11.123 17.6584 11.123ZM17.5763 3.28231C15.8558 2.70066 13.4742 2.94178 11.9877 4.72482C10.4263 2.95447 8.12562 2.69748 6.41713 3.28337C2.50101 4.6159 1.27966 9.41298 2.39398 13.0922C4.15248 18.8781 9.99917 22 12.0017 22C13.7893 22 19.868 18.9373 21.6065 13.0922C22.7208 9.41404 21.4965 4.61695 17.5763 3.28231Z"
          fill={`url(#${id})`}
        />
      </svg>
    </div>
  );
}

/* ── AVATAR STACK ─────────────────────────────────────────────── */
const SAMPLE_AVATARS = [

  { initial: "+5", gradient: "#9CA3AF" },
];
function AvatarStack({ members, size = 24 }) {
  return (
    <div style={{ display: "flex" }}>
      {members.map((m, i) => (
        <div key={i} style={{
          width: size, height: size, borderRadius: "50%",
          background: m.gradient, border: "1.5px solid #fff",
          marginLeft: i === 0 ? 0 : -(size * 0.34),
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: Math.round(size * 0.36), fontWeight: 700, color: "#fff",
          zIndex: members.length - i, position: "relative",
        }}>{m.initial}</div>
      ))}
    </div>
  );
}

/* ── TOGGLE ───────────────────────────────────────────────────── */
function Toggle({ on, onToggle }) {

      background: on ? "#0F6EFF" : "#E2E6EF",

        width: 20, height: 20, borderRadius: "50%",
        background: "#fff", position: "absolute", top: 3,

}

                style={{ width: 72, height: 56, margin: "0 4px", borderRadius: 10, background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3 }}>
                <Icon src={item.icon} size={22} color={color} />

            );
          })}
        </div>
        <div style={{ borderTop: "1px solid #F0F2F7", padding: "8px 0", width: "100%", display: "flex", justifyContent: "center" }}>
          <button onClick={() => setActive("settings")} style={{ width: 72, height: 56, borderRadius: 10, background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3 }}>

          </button>
        </div>
      </div>
    </div>
  );
}
