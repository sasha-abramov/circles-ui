<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FamSync — Sign In</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; }
  body { font-family: "Google Sans", sans-serif; background: var(--color-primary-light); color: #1B1E28; }
  button { font-family: "Google Sans", sans-serif; }
  input { font-family: "Google Sans", sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #E2E6EF; border-radius: 4px; }
  input::placeholder { color: #9CA3AF; }
  @keyframes authFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }
  @keyframes authRide0 {
    from { offset-distance: 0%; -webkit-offset-distance: 0%; }
    to   { offset-distance: 100%; -webkit-offset-distance: 100%; }
  }
  @keyframes authRide1 {
    from { offset-distance: 0%; -webkit-offset-distance: 0%; }
    to   { offset-distance: 100%; -webkit-offset-distance: 100%; }
  }
  @keyframes authRide2 {
    from { offset-distance: 0%; -webkit-offset-distance: 0%; }
    to   { offset-distance: 100%; -webkit-offset-distance: 100%; }
  }
  @keyframes authRide3 {
    from { offset-distance: 0%; -webkit-offset-distance: 0%; }
    to   { offset-distance: 100%; -webkit-offset-distance: 100%; }
  }
  @keyframes authRide4 {
    from { offset-distance: 0%; -webkit-offset-distance: 0%; }
    to   { offset-distance: 100%; -webkit-offset-distance: 100%; }
  }
  @keyframes authPulse {
    0%   { transform: scale(1);   opacity: 0.55; }
    100% { transform: scale(2.6); opacity: 0;    }
  }
  @keyframes authOrbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes authOrbitCounter {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/components.js?v=60"></script>
<script type="text/babel" src="js/auth-components.js?v=17"></script>
<script type="text/babel" src="js/screen-signin.js?v=8"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById("root")).render(<SignInScreen />);
</script>
</body>
</html>
