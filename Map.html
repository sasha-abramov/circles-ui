<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FamSync — Map</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: "Google Sans", sans-serif; background: #fff; color: #1B1E28; }
  button { font-family: "Google Sans", sans-serif; }
  input  { font-family: "Google Sans", sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #E2E6EF; border-radius: 4px; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes sosRipple {
    0%   { transform: scale(0.9); opacity: 0.55; }
    80%  { transform: scale(2.2); opacity: 0; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes sosPulse {
    0%, 100% { box-shadow: 0 2px 16px rgba(255,59,48,0.55), 0 0 0 0 rgba(255,59,48,0.45); }
    50%      { box-shadow: 0 2px 22px rgba(255,59,48,0.85), 0 0 0 6px rgba(255,59,48,0); }
  }
  input::placeholder { color: #9CA3AF; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/data.js?v=29"></script>
<script type="text/babel" src="js/components.js?v=63"></script>
<script type="text/babel" src="js/navigation.js?v=47"></script>
<script type="text/babel" src="js/page-shell.js?v=31"></script>
<script type="text/babel" src="js/screen-map.js?v=60"></script>
<script type="text/babel">
function MapPage() {
  const savedId = +localStorage.getItem("activeCircleId");
  const [activeCircle, setActiveCircle] = useState(
    CIRCLES.find(c => c.id === savedId) || CIRCLES[0]
  );
  const handleCircleChange = (circle) => {
    localStorage.setItem("activeCircleId", circle.id);
    setActiveCircle(circle);
  };
  return (
    <PageShell>
      {isMobile => (
        <MapScreen isMobile={isMobile} activeCircle={activeCircle} onCircleChange={handleCircleChange} />
      )}
    </PageShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<MapPage />);
</script>
</body>
</html>
